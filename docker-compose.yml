version: "3.9"

services:
  api:
    build:
      context: ./apps/api
      args:
        PYTHON_IMAGE: ${TALK2SHEET_PYTHON_IMAGE:-python:3.11-slim}
    environment:
      TALK2SHEET_API_PORT: ${TALK2SHEET_API_PORT:-8000}
      TALK2SHEET_DATA_DIR: /app/data
      TALK2SHEET_ALLOWED_ORIGINS: http://localhost:${TALK2SHEET_WEB_PORT:-8080}
      TALK2SHEET_MAX_PREVIEW_ROWS: ${TALK2SHEET_MAX_PREVIEW_ROWS:-200}
      TALK2SHEET_MAX_ANALYSIS_ROWS: ${TALK2SHEET_MAX_ANALYSIS_ROWS:-50000}
      TALK2SHEET_FILE_STORE_BACKEND: ${TALK2SHEET_FILE_STORE_BACKEND:-local}
      TALK2SHEET_PLANNER_PROVIDER: ${TALK2SHEET_PLANNER_PROVIDER:-auto}
      TALK2SHEET_CONTEXT_INTERPRETER_PROVIDER: ${TALK2SHEET_CONTEXT_INTERPRETER_PROVIDER:-auto}
      TALK2SHEET_REPAIR_PROVIDER: ${TALK2SHEET_REPAIR_PROVIDER:-auto}
      TALK2SHEET_ANSWER_PROVIDER: ${TALK2SHEET_ANSWER_PROVIDER:-rule}
      TALK2SHEET_LLM_API_KEY: ${TALK2SHEET_LLM_API_KEY:-}
      TALK2SHEET_LLM_BASE_URL: ${TALK2SHEET_LLM_BASE_URL:-}
      TALK2SHEET_LLM_MODEL: ${TALK2SHEET_LLM_MODEL:-gpt-4.1-mini}
      TALK2SHEET_LLM_TIMEOUT_SECONDS: ${TALK2SHEET_LLM_TIMEOUT_SECONDS:-30}
      TALK2SHEET_LLM_MAX_TOKENS: ${TALK2SHEET_LLM_MAX_TOKENS:-1800}
      TALK2SHEET_LLM_TEMPERATURE: ${TALK2SHEET_LLM_TEMPERATURE:-0}
      TALK2SHEET_LLM_USE_JSON_SCHEMA: ${TALK2SHEET_LLM_USE_JSON_SCHEMA:-true}
    volumes:
      - ./data:/app/data
    ports:
      - "${TALK2SHEET_API_PORT:-8000}:8000"

  web:
    build:
      context: ./apps/web
      args:
        NODE_IMAGE: ${TALK2SHEET_NODE_IMAGE:-node:20-alpine}
        NGINX_IMAGE: ${TALK2SHEET_NGINX_IMAGE:-nginx:1.27-alpine}
    depends_on:
      - api
    ports:
      - "${TALK2SHEET_WEB_PORT:-8080}:80"
