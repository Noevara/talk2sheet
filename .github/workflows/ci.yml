name: CI

on:
  push:
  pull_request:

jobs:
  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        run: pip install -e "apps/api[dev]"

      - name: Check generated contracts
        run: python apps/api/scripts/check_contract_artifacts.py

  api:
    name: API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        run: pip install -e "apps/api[dev]"

      - name: Compile API sources
        run: cd apps/api && python -m compileall app

      - name: Run API tests
        run: cd apps/api && pytest -q

  intent-regression:
    name: Intent Regression
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        run: pip install -e "apps/api[dev]"

      - name: Run intent regression eval
        id: intent_eval
        continue-on-error: true
        run: python apps/api/scripts/eval_intent_cases.py

      - name: Upload intent failure snapshot
        if: steps.intent_eval.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: intent-regression-failure-snapshot
          path: apps/api/.artifacts/intent_regression_failure_snapshot.json
          if-no-files-found: ignore

      - name: Fail job on intent regression mismatch
        if: steps.intent_eval.outcome == 'failure'
        run: exit 1

  join-beta-regression:
    name: Join Beta Regression
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        run: pip install -e "apps/api[dev]"

      - name: Run join beta regression eval
        id: join_beta_eval
        continue-on-error: true
        run: python apps/api/scripts/eval_join_beta_cases.py

      - name: Upload join beta failure snapshot
        if: steps.join_beta_eval.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: join-beta-regression-failure-snapshot
          path: apps/api/.artifacts/join_beta_failure_snapshot.json
          if-no-files-found: ignore

      - name: Fail job on join beta regression mismatch
        if: steps.join_beta_eval.outcome == 'failure'
        run: exit 1

  batch-perf-baseline:
    name: Batch Perf Baseline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        run: pip install -e "apps/api[dev]"

      - name: Run batch perf baseline
        id: batch_perf
        continue-on-error: true
        run: python apps/api/scripts/eval_batch_perf_baseline.py --json

      - name: Upload batch perf report
        uses: actions/upload-artifact@v4
        with:
          name: batch-perf-baseline-report
          path: apps/api/.artifacts/batch_perf_baseline_report.json
          if-no-files-found: ignore

      - name: Upload batch perf failure snapshot
        if: steps.batch_perf.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: batch-perf-baseline-failure-snapshot
          path: apps/api/.artifacts/batch_perf_baseline_failure_snapshot.json
          if-no-files-found: ignore

      - name: Fail job on batch perf baseline mismatch
        if: steps.batch_perf.outcome == 'failure'
        run: exit 1

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: cd apps/web && npm ci

      - name: Run web layered checks
        run: cd apps/web && npm run ci
