name: CI

on:
  push:
  pull_request:

jobs:
  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        run: pip install -e "apps/api[dev]"

      - name: Check generated contracts
        run: python apps/api/scripts/check_contract_artifacts.py

  api:
    name: API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        run: pip install -e "apps/api[dev]"

      - name: Compile API sources
        run: cd apps/api && python -m compileall app

      - name: Run API tests
        run: cd apps/api && pytest -q

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: cd apps/web && npm ci

      - name: Run web layered checks
        run: cd apps/web && npm run ci
